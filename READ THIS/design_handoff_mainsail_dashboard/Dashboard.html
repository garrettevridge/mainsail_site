<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Alaska Fisheries — Reference Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* -----------------------------------------------------------------
     TWEAKABLE VARIABLES — set by Tweaks panel
     ----------------------------------------------------------------- */
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --ink: #121212;
    --ink-soft: #333333;
    --muted: #666666;
    --rule: #dcdcdc;
    --rule-soft: #ececec;
    --table-alt: #fafafa;

    /* Primary-color accents (red / blue / yellow) */
    --accent-blue:   #1a5fb4;
    --accent-red:    #b4261a;
    --accent-yellow: #c79a0c;

    /* Mapped accents used throughout */
    --accent:        var(--accent-blue);   /* primary */
    --accent-2:      var(--accent-red);    /* secondary */
    --accent-3:      var(--accent-yellow); /* tertiary */

    --font-serif: 'Source Serif 4', 'Georgia', serif;
    --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;

    --base-size: 14.5px;
    --col-max: 1060px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--font-sans);
    font-size: var(--base-size);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .serif { font-family: var(--font-serif); font-weight: 400; }
  .mono  { font-family: var(--font-mono); }

  /* -------- Shell -------- */
  .shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  aside.nav {
    background: #fafafa;
    border-right: 1px solid var(--rule);
    padding: 32px 26px 40px;
    position: sticky; top: 0; align-self: start; height: 100vh; overflow-y: auto;
  }
  .brand { font-family: var(--font-serif); font-size: 22px; line-height: 1.15; font-weight: 600; letter-spacing: -0.015em; color: var(--ink); }
  .brand::before { content: ""; display: block; width: 22px; height: 2px; background: var(--ink); margin-bottom: 10px; }
  .brand-sub { font-size: 10.5px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.14em; font-family: var(--font-sans); font-weight: 500; }

  .nav-section { margin-top: 28px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; }
  .nav-list { list-style: none; padding: 0; margin: 10px 0 0; }
  .nav-list li {
    padding: 8px 0; cursor: pointer; font-size: 13.5px; color: var(--ink-soft);
    display: flex; gap: 12px; align-items: baseline;
    border-bottom: 1px solid transparent;
  }
  .nav-list li:hover { color: var(--accent); }
  .nav-list li.active { color: var(--ink); font-weight: 600; }
  .nav-list li.active .num { color: var(--accent-2); }
  .nav-list li .num { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); min-width: 22px; }

  .nav-foot { margin-top: 32px; font-size: 11.5px; color: var(--muted); line-height: 1.55; border-top: 1px solid var(--rule); padding-top: 14px; font-family: var(--font-serif); }

  main { padding: 48px 64px 96px; max-width: var(--col-max); }
  .crumb { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; }
  .crumb .sep { color: var(--rule); margin: 0 8px; }
  .crumb .topic { color: var(--accent); }

  h1.page-title {
    font-family: var(--font-serif);
    font-weight: 600;
    letter-spacing: -0.02em;
    font-size: 44px;
    line-height: 1.05;
    margin: 10px 0 14px;
    color: var(--ink);
  }
  .page-lede {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 780px;
    margin: 0 0 14px;
    font-family: var(--font-serif);
    line-height: 1.55;
  }
  .page-lede.first-sentence {
    font-family: var(--font-serif);
    font-size: 20px;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 16px;
    font-weight: 400;
  }

  .rule-hair { height: 1px; background: var(--ink); margin: 28px 0 0; max-width: 60px; }

  /* -------- Topic sections -------- */
  .topic-section { display: none; }
  .topic-section.active { display: block; opacity: 1; }

  h2.h2 {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 24px;
    letter-spacing: -0.01em;
    margin: 40px 0 4px;
    color: var(--ink);
    padding-top: 18px;
    border-top: 1px solid var(--rule);
  }
  h3.h3 {
    font-family: var(--font-sans);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 600;
    margin: 24px 0 8px;
  }
  .section-intro { color: var(--ink-soft); max-width: 760px; margin: 4px 0 14px; font-family: var(--font-serif); font-size: 15px; }

  .card { background: var(--panel); border: 1px solid var(--rule); border-radius: 2px; padding: 20px 22px; margin: 14px 0; }
  .card + .card { margin-top: 14px; }
  .card-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; margin: 0 0 4px; color: var(--ink); }
  .card-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  /* -------- Tables -------- */
  table.data { width: 100%; border-collapse: collapse; font-size: 13.5px; margin: 10px 0 4px; }
  table.data th, table.data td {
    padding: 9px 12px 9px 0;
    text-align: left; vertical-align: top;
    border-bottom: 1px solid var(--rule-soft);
  }
  table.data th:first-child, table.data td:first-child { padding-left: 2px; }
  table.data thead th {
    border-bottom: 1.5px solid var(--ink);
    font-family: var(--font-sans);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink);
    font-weight: 700;
    padding-bottom: 6px;
  }
  table.data tbody tr:hover { background: var(--table-alt); }
  table.data td.num, table.data th.num {
    text-align: right;
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 12.5px;
  }
  table.data td.yr { font-family: var(--font-mono); width: 58px; }
  table.data tfoot td {
    border-top: 1.5px solid var(--ink);
    border-bottom: none;
    font-weight: 600;
    font-size: 13px;
    padding-top: 10px;
  }

  /* Charts */
  svg.chart { display: block; width: 100%; height: auto; }
  .chart-wrap { margin: 12px 0 4px; }
  .chart-title { font-family: var(--font-serif); font-size: 15.5px; font-weight: 600; margin-bottom: 2px; color: var(--ink); }
  .chart-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-family: var(--font-serif); }
  .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; font-size: 11.5px; color: var(--ink-soft); margin-top: 10px; }
  .legend .sw { display: inline-block; width: 10px; height: 10px; margin-right: 6px; border-radius: 1px; vertical-align: middle; }

  /* Layout helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .shell { grid-template-columns: 1fr; } aside.nav { height: auto; position: static; } main { padding: 32px 24px 64px; } }

  .kv { display: grid; grid-template-columns: 170px 1fr; gap: 6px 16px; font-size: 13.5px; }
  .kv dt { color: var(--muted); }
  .kv dd { margin: 0; color: var(--ink); }

  .pill {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--muted);
    font-weight: 600;
  }
  .pill.fed { border-color: var(--accent); color: var(--accent); }
  .pill.st  { border-color: var(--accent-2); color: var(--accent-2); }
  .pill.int { border-color: var(--accent-3); color: #8a6a00; }

  /* Timeline */
  .timeline { border-left: 1.5px solid var(--ink); margin: 14px 0 10px 10px; padding-left: 20px; }
  .tl-item { position: relative; margin-bottom: 16px; }
  .tl-item::before {
    content: ""; position: absolute; left: -26px; top: 6px;
    width: 9px; height: 9px; background: var(--bg); border: 1.5px solid var(--ink); border-radius: 50%;
  }
  .tl-item.accent::before { background: var(--accent-2); border-color: var(--accent-2); }
  .tl-year { font-family: var(--font-mono); font-weight: 500; font-size: 11.5px; color: var(--accent); letter-spacing: 0.04em; }
  .tl-title { font-family: var(--font-serif); font-size: 15.5px; font-weight: 600; margin: 1px 0 2px; color: var(--ink); }
  .tl-body { font-size: 13px; color: var(--ink-soft); font-family: var(--font-serif); line-height: 1.5; }

  /* Flow */
  .flow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; margin: 16px 0; }
  .flow-step {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 12px 14px;
    font-size: 11.5px;
    position: relative;
    min-height: 80px;
  }
  .flow-step .step-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .flow-step .step-value { font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--ink); }
  .flow-step:not(:last-child)::after {
    content: "→"; position: absolute; right: -9px; top: 50%; transform: translateY(-50%);
    background: var(--bg); color: var(--accent); z-index: 2; padding: 0 4px;
    font-family: var(--font-mono); font-size: 13px;
  }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1.5px solid var(--ink); border-bottom: 1px solid var(--rule); margin: 14px 0; }
  .stat { padding: 14px 18px 14px 0; border-right: 1px solid var(--rule-soft); }
  .stat:last-child { border-right: none; }
  .stat-val { font-family: var(--font-serif); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
  .stat-val.accent { color: var(--accent); }
  .stat-val.accent-2 { color: var(--accent-2); }
  .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-top: 3px; font-weight: 600; }
  .stat-sub { font-size: 12px; color: var(--ink-soft); margin-top: 4px; font-family: var(--font-serif); }
  @media (max-width: 900px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  /* Note */
  .note {
    border-left: 2px solid var(--accent);
    padding: 10px 16px;
    background: #fbfbfb;
    margin: 16px 0;
    font-size: 13.5px;
    color: var(--ink-soft);
    font-family: var(--font-serif);
    line-height: 1.5;
  }
  .note b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>

<div class="shell">
  <aside class="nav">
    <div class="brand">Alaska Fisheries<br/>Reference Dashboard</div>
    <div class="brand-sub">Mainsail · Data engine v0.1</div>

    <div class="nav-section">Topics</div>
    <ul class="nav-list" id="nav"></ul>

    <div class="nav-foot">
      Figures sourced from NMFS, ADF&amp;G, IPHC, NPFMC and AFSC publications.
      Nothing on this page is an advocacy statement.
    </div>
  </aside>

  <main>
    <div class="crumb"><span>Dashboard</span><span class="sep">/</span><span class="topic" id="crumb-topic"></span></div>
    <div id="panels"></div>
  </main>
</div>

<!-- Libraries -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Panels (injects DOM directly) -->
<script src="assets/panels.js"></script>

<!-- Tweaks shell + our panel -->
<script type="text/babel" src="assets/tweaks-panel.jsx"></script>
<script type="text/babel" src="assets/tweaks-app.jsx"></script>

</body>
</html>
