<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mainsail</title>
  <!--
    GitHub Pages SPA fallback. Mainsail uses BrowserRouter under the
    /mainsail_site/ base path; GH Pages 404s on any deep link because
    no static file exists at that path. This page captures the
    requested path and redirects to /mainsail_site/?/<path>, where
    a tiny decoder in index.html rewrites history before React mounts.

    pathSegmentsToKeep = 1 keeps the /mainsail_site/ repo subpath.
    Technique: https://github.com/rafgraph/spa-github-pages
  -->
  <script type="text/javascript">
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
